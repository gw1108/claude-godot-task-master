name: Sync with upstream

on:
  schedule:
    - cron: '0 6 * * *'    # daily at 06:00 UTC
  workflow_dispatch:        # also allows manual runs from Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/eyaltoledano/claude-task-master.git
          git fetch upstream main

      - name: Check if sync is needed
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Fork is $BEHIND commit(s) behind upstream/main"

      - name: Skip if a sync PR is already open
        if: steps.check.outputs.behind != '0'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --state open --base main --search "head:sync/upstream-" --json headRefName --jq '.[0].headRefName // ""')
          echo "existing=$EXISTING" >> "$GITHUB_OUTPUT"
          if [ -n "$EXISTING" ]; then
            echo "Open sync PR already exists on branch $EXISTING — skipping new sync"
          fi

      - name: Compute dated branch name
        if: steps.check.outputs.behind != '0' && steps.existing.outputs.existing == ''
        id: branch
        run: |
          NAME="sync/upstream-$(date -u +%Y-%m-%d)"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Create sync branch
        if: steps.check.outputs.behind != '0' && steps.existing.outputs.existing == ''
        run: |
          git checkout -B "${{ steps.branch.outputs.name }}" origin/main
          # Attempt the merge; allow conflicts so PR surfaces them
          git merge --no-edit upstream/main || echo "Merge had conflicts — PR will show them"
          git push origin "${{ steps.branch.outputs.name }}"

      - name: Open PR
        if: steps.check.outputs.behind != '0' && steps.existing.outputs.existing == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.name }}" \
            --title "chore: sync with upstream (${{ steps.branch.outputs.name }})" \
            --body "Automated merge of \`upstream/main\` into \`main\`.\n\nIf conflicts appear, resolve them on the \`${{ steps.branch.outputs.name }}\` branch."

      - name: Enable auto-merge on the PR
        if: steps.check.outputs.behind != '0' && steps.existing.outputs.existing == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.branch.outputs.name }}" --auto --merge || \
            echo "Auto-merge not enabled — either repo setting is off, or there are conflicts."
