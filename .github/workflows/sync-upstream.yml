name: Sync with upstream

on:
  schedule:
    - cron: '0 6 * * *'    # daily at 06:00 UTC
  workflow_dispatch:        # also allows manual runs from Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/eyaltoledano/claude-task-master.git
          git fetch upstream main

      - name: Check if sync is needed
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Fork is $BEHIND commit(s) behind upstream/main"

      - name: Create or update sync branch
        if: steps.check.outputs.behind != '0'
        run: |
          git checkout -B sync/upstream origin/main
          # Attempt the merge; allow conflicts so PR surfaces them
          git merge --no-edit upstream/main || echo "Merge had conflicts — PR will show them"
          git push -f origin sync/upstream

      - name: Open PR if not already open
        if: steps.check.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh pr view sync/upstream --json number > /dev/null 2>&1; then
            gh pr create \
              --base main \
              --head sync/upstream \
              --title "chore: sync with upstream" \
              --body "Automated merge of \`upstream/main\` into \`main\`.\n\nIf conflicts appear, resolve them on the \`sync/upstream\` branch."
          else
            echo "PR already exists; branch was updated above."
          fi

      - name: Enable auto-merge on the PR
        if: steps.check.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge sync/upstream --auto --merge || \
            echo "Auto-merge not enabled — either repo setting is off, or there are conflicts."
